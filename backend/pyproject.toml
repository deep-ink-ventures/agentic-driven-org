[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "S",    # flake8-bandit (security)
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "S101",   # assert usage (needed in tests)
    "S105",   # hardcoded password (false positives on test fixtures)
    "S106",   # hardcoded password argument
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S"]
"**/migrations/**" = ["E", "W", "F", "I"]

[tool.ruff.format]
quote-style = "double"
